<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Palais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="main-content">
            
            <header class="navbar">
                <h1 class="logo">LE PALAIS</h1>
                <nav>
                    <ul>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="index.html" style="color: #9b8450;">LE PALAIS</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>

            <section class="hero">
                <img src="resto.jpg" alt="Restaurant">
                <div class="hero-text">
                    <h2>LE PALAIS</h2>
                </div>
            </section>

            <section class="about">
                <div class="about-text">
                    <h3>L'ART DE RECEVOIR</h3>
                    <p>
                        Bienvenue au Palais, une célébration de la haute gastronomie
                        où tradition et créativité se rencontrent pour sublimer
                        vos moments de partage.
                    </p>
                </div>

                <div class="about-image">
                    <img src="restaurant.jpg" alt="Terrasse">
                </div>
            </section>

            <section class="menu-section">
                <h3>Explorer notre Menu</h3>

                <div class="menu-cards">
                    <div class="card">
                        <h4>Starters</h4>
                        <img src="food 1.jpg" alt="Starter">
                    </div>

                    <div class="card">
                        <h4>Main Courses</h4>
                        <img src="foof 2.jpg" alt="Main Course">
                    </div>

                    <div class="card">
                        <h4>Desserts</h4>
                        <img src="food 6.webp" alt="Dessert">
                    </div>
                </div>
            </section>

        </div>

        <aside class="sidebar">

            <div class="gallery">
                <img src="food 1.jpg" alt="">
                <img src="food 3.jpg" alt="">
                <img src="food 5.jpg" alt="">
                <img src="food 4.jpg" alt="">
                <img src="food 8.jpg" alt="">
                <img src="food 7.jpg" alt="">
            </div>

            <div class="visit-us">
                <h3>VISIT US</h3>
                <img src="MAP.jpeg" alt="Map">
            </div>

        </aside>

    </div>
    <script src="index.js"></script>

</body>
</html>
