<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Palais - Contact</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="page-container">

        <section class="contact-page">
            
            <header class="navbar">
                <nav>
                    <ul>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="index.html" style="color: #9b8450;">LE PALAIS</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>

            <div class="hero-section">
                <img src="resto.jpg" alt="Restaurant">
                <div class="hero-overlay">
                    <h1>LE PALAIS</h1>
                </div>
            </div>

            <div class="info-section">

                <div class="info-card">
                    <div class="info-item">
                        <i class="fas fa-location-dot"></i>
                        <div>
                            <h3>OUR LOCATION</h3>
                            <p>14 Rue de la paix , Paris</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h3>PHONE</h3>
                            <p>+33 1 45 87 89 10</p>
                        </div>
                    </div>

                    <div class="info-item">
                        <i class="far fa-clock"></i>
                        <div>
                            <h3>OPENING HOURS</h3>
                            <p>Mon-Sat : 8:00 AM-12:00PM</p>
                            <p>/ SUN : CLOSED</p>
                        </div>
                    </div>
                </div>

                <div class="email-map">
                    <div class="email-box">
                        <i class="far fa-envelope"></i>
                        <div>
                            <h3>EMAIL</h3>
                            <p>Palaisreservation@gmail.com</p>
                        </div>
                    </div>

                    <div class="map-box">
                        <img src="MAP.jpeg" alt="Map">
                    </div>
                </div>

            </div>
        </section>

        <aside class="contact-form">
            <h2>CONTACT FORM</h2>

            <form>
                <input type="text" placeholder="NAME">
                <input type="email" placeholder="Email Adresse">
                <input type="text" placeholder="Repas à commander">
                <textarea placeholder="Message"></textarea>
                <button type="submit">SEND MESSAGE</button>
            </form>
        </aside>

    </div>
<script src="contact.js"></script>
</body>
</html>
